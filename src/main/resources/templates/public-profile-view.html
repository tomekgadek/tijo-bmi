<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{base.html :: head}"></head>

<body th:replace="~{base.html :: layout(~{::content})}">
    <div th:fragment="content">
        <div class="page-header">
            <a href="/public/profiles" class="back-link" th:text="#{public.view.back}">&larr; Powrót do listy</a>
            <h1 th:text="#{public.view.title(${profileUser.username})}">Profil</h1>
        </div>

        <div class="card">
            <h3
                th:text="${profileUser.firstName != null ? profileUser.firstName + ' ' + (profileUser.lastName != null ? profileUser.lastName : '') : profileUser.username}">
                Imię Nazwisko</h3>

            <div th:if="${profileUser.motivationalQuote != null and profileUser.motivationalQuote != ''}"
                class="profile-detail-quote">
                <p th:text="${'&quot;' + profileUser.motivationalQuote + '&quot;'}"></p>
            </div>

            <div th:if="${profileUser.achievement != null and profileUser.achievement != ''}"
                class="profile-detail-achievement">
                <strong class="achievement-label" th:text="#{public.view.achievements}">Historia i Cele:</strong>
                <p class="achievement-text" th:text="${profileUser.achievement}"></p>
            </div>

            <div class="pure-g profile-detail-stats">
                <div class="pure-u-1-2">
                    <span class="profile-detail-stat-label" th:text="#{public.view.height}">Wzrost:</span>
                    <p class="profile-detail-stat-value"
                        th:text="${profileUser.height != null ? profileUser.height + ' cm' : '-'}"></p>
                </div>
                <div class="pure-u-1-2">
                    <span class="profile-detail-stat-label" th:text="#{public.view.weight}">Aktualna waga:</span>
                    <p id="stat-weight" class="profile-detail-stat-value"
                        th:text="${stats != null and stats.currentWeight != null ? stats.currentWeight + ' kg' : '-'}">
                    </p>
                </div>
            </div>
            <div class="profile-detail-bmi">
                <span class="profile-detail-stat-label" th:text="#{public.view.bmi}">Aktualne BMI:</span>
                <p class="profile-detail-stat-value">
                    <span id="stat-bmi"
                        th:text="${stats != null and stats.currentBMI != null ? #numbers.formatDecimal(stats.currentBMI, 1, 'POINT', 1, 'POINT') : '-'}"></span>
                    - <span id="stat-category" th:text="${stats != null ? stats.category : ''}"></span>
                </p>
            </div>
        </div>

        <div class="card">
            <h3 th:text="#{public.view.progress}">Postęp wagi</h3>
            <div class="chart-container">
                <canvas id="weight-chart"></canvas>
            </div>
        </div>

        <div class="card" th:if="${weightHistory != null and !weightHistory.empty}">
            <h3 th:text="#{public.view.history}">Historia pomiarów</h3>
            <div class="table-container">
                <div class="pagination-container">
                    <div class="pagination-info"
                        th:text="#{public.view.pagination.info(${currentPage * pageSize + 1}, ${(currentPage + 1) * pageSize > totalItems ? totalItems : (currentPage + 1) * pageSize}, ${totalItems})}">
                        Pomiary <span></span> -
                        <span></span>
                        z <span></span>
                    </div>

                    <div class="pagination" th:if="${totalPages > 1}">
                        <a th:href="@{/public/profile/{id}(id=${profileUser.id}, page=${currentPage - 1}, size=${pageSize})}"
                            class="pure-button pagination-button"
                            th:classappend="${currentPage == 0} ? 'pure-button-disabled'"
                            th:text="#{public.view.pagination.prev}">Poprzednia</a>

                        <span class="pagination-text"
                            th:text="#{public.view.pagination.page(${currentPage + 1}, ${totalPages})}">
                            Strona <span></span> z <span></span>
                        </span>

                        <a th:href="@{/public/profile/{id}(id=${profileUser.id}, page=${currentPage + 1}, size=${pageSize})}"
                            class="pure-button pagination-button"
                            th:classappend="${currentPage + 1 >= totalPages} ? 'pure-button-disabled'"
                            th:text="#{public.view.pagination.next}">Następna</a>
                    </div>

                    <div>
                        <form th:action="@{/public/profile/{id}(id=${profileUser.id})}" method="get"
                            class="pagination-form">
                            <label class="pagination-label" th:text="#{public.view.pagination.per_page}">Na
                                stronę:</label>
                            <select name="size" onchange="this.form.submit()" class="pagination-select">
                                <option th:value="25" th:selected="${pageSize == 25}">25</option>
                                <option th:value="50" th:selected="${pageSize == 50}">50</option>
                                <option th:value="75" th:selected="${pageSize == 75}">75</option>
                                <option th:value="100" th:selected="${pageSize == 100}">100</option>
                            </select>
                            <input type="hidden" name="page" th:value="0">
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script th:inline="javascript">
            /*<![CDATA[*/
            const chartLabels = /*[[${chartLabels}]]*/[];
            const chartData = /*[[${chartData}]]*/[];
            const chartWeightLabel = /*[[#{chart.label.weight}]]*/ 'Waga (kg)';
            /*]]>*/
        </script>

        <script th:src="@{/js/bmi-chart.js}"></script>
    </div>
</body>

</html>
