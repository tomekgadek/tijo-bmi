<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Weight Tracker</title>

    <!-- Pure.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/pages.css}">
</head>

<body th:fragment="layout(content)">
    <header class="header">
        <div class="container">
            <a href="/" class="brand" th:text="#{app.title}">WeightTracker</a>
            <nav class="nav-menu">
                <a href="/" class="nav-link" th:text="#{nav.home}">Home</a>
                <a href="/public/profiles" class="nav-link" th:text="#{nav.public}">Public</a>
                <a href="/admin/dashboard" class="nav-link" sec:authorize="hasRole('ADMIN')"
                    th:text="#{nav.admin}">Panel Admina</a>
                <a href="/profile" class="nav-link" sec:authorize="isAuthenticated()"
                    th:text="#{nav.profile}">Profil</a>
                <a href="/login" class="nav-link" sec:authorize="!isAuthenticated()" th:text="#{nav.login}">Zaloguj</a>
                <a href="/register" class="nav-link" sec:authorize="!isAuthenticated()"
                    th:text="#{nav.register}">Rejestracja</a>
                <a href="/logout" class="nav-link" sec:authorize="isAuthenticated()" th:text="#{nav.logout}">Wyloguj</a>

                <!-- Language Switcher -->
                <div class="lang-switcher" style="display:inline-block; margin-left: 15px;">
                    <a th:href="@{/(lang=pl)}" class="nav-link lang-link"
                        th:style="${#locale.language == 'pl' ? 'font-weight:bold; color:var(--primary-color);' : ''}">PL</a>
                    <span style="color:var(--text-secondary);">|</span>
                    <a th:href="@{/(lang=en)}" class="nav-link lang-link"
                        th:style="${#locale.language == 'en' ? 'font-weight:bold; color:var(--primary-color);' : ''}">EN</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <footer>
        <p th:text="#{app.footer}">&copy; 2026 WeightTracker. Minimalistyczne śledzenie wagi.</p>
    </footer>
</body>

</html>
