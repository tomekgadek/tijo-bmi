<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{app.title}">Weight Tracker</title>

    <!-- Pure.css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/pure-min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/purecss@3.0.0/build/grids-responsive-min.css">

    <!-- Google Fonts: Inter + JetBrains Mono (dark theme) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Apply saved theme before render to prevent flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <link rel="stylesheet" th:href="@{/css/pages.css}">
</head>

<body th:fragment="layout(content)">
    <header class="header">
        <div class="container">
            <a href="/" class="brand" th:text="#{app.title}">WeightTracker</a>
            <button class="menu-toggle" id="menu-toggle">
                <span class="hamburger"></span>
            </button>
            <nav class="nav-menu" id="nav-menu">
                <a href="/" class="nav-link" th:text="#{nav.home}">Home</a>
                <a href="/public/profiles" class="nav-link" th:text="#{nav.public}">Public</a>
                <a href="/admin/dashboard" class="nav-link" sec:authorize="hasRole('ADMIN')"
                    th:text="#{nav.admin}">Panel Admina</a>

                <!-- Account Dropdown -->
                <div class="nav-item-dropdown" sec:authorize="isAuthenticated()">
                    <div class="nav-link dropdown-trigger" th:text="#{nav.profile}">Konto</div>
                    <div class="dropdown-menu">
                        <a href="/profile" class="dropdown-item" th:text="#{nav.profile}">Moje Dane</a>
                        <a href="/logout" class="dropdown-item" th:text="#{nav.logout}">Wyloguj</a>
                    </div>
                </div>

                <th:block sec:authorize="!isAuthenticated()">
                    <a href="/login" class="nav-link" th:text="#{nav.login}">Zaloguj</a>
                    <a href="/register" class="nav-link" th:text="#{nav.register}">Rejestracja</a>
                </th:block>

                <!-- Theme Toggle -->
                <button class="theme-toggle" id="theme-toggle" title="Przełącz tryb jasny/ciemny">
                    <span id="theme-icon">🌙</span>
                </button>

                <!-- Language Dropdown -->
                <div class="nav-item-dropdown">
                    <div class="nav-link dropdown-trigger" th:text="${#locale.language.toUpperCase()}">EN</div>
                    <div class="dropdown-menu">
                        <a th:href="@{/(lang=pl)}" class="dropdown-item"
                            th:style="${#locale.language == 'pl' ? 'font-weight:bold; color:var(--primary-color);' : ''}">PL
                            - Polski</a>
                        <a th:href="@{/(lang=en)}" class="dropdown-item"
                            th:style="${#locale.language == 'en' ? 'font-weight:bold; color:var(--primary-color);' : ''}">EN
                            - English</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <script>
        document.getElementById('menu-toggle').addEventListener('click', function () {
            document.getElementById('nav-menu').classList.toggle('active');
        });

        // Close menu when clicking on a link (important for single-page feel)
        document.querySelectorAll('.nav-link:not(.dropdown-trigger), .dropdown-item').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('nav-menu').classList.remove('active');
            });
        });

        // Mobile dropdown toggle
        document.querySelectorAll('.dropdown-trigger').forEach(trigger => {
            trigger.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    trigger.parentElement.classList.toggle('active');
                }
            });
        });

        // Theme toggle
        (function() {
            var themeToggle = document.getElementById('theme-toggle');
            var themeIcon = document.getElementById('theme-icon');

            function updateIcon(theme) {
                themeIcon.textContent = theme === 'dark' ? '☀️' : '🌙';
            }

            // Set initial icon based on current theme
            updateIcon(localStorage.getItem('theme') || 'light');

            themeToggle.addEventListener('click', function() {
                var currentTheme = document.documentElement.getAttribute('data-theme');
                var newTheme = currentTheme === 'dark' ? 'light' : 'dark';

                if (newTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }

                localStorage.setItem('theme', newTheme);
                updateIcon(newTheme);
            });
        })();
    </script>

    <main>
        <div th:replace="${content}"></div>
    </main>

    <footer>
        <p th:text="#{app.footer}">&copy; 2026 WeightTracker. Minimalistyczne śledzenie wagi.</p>
    </footer>
</body>

</html>
