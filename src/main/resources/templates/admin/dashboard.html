<!DOCTYPE html>
<html lang="pl" xmlns:th="http://www.thymeleaf.org">

<head th:replace="base.html :: head"></head>

<body th:replace="base.html :: layout(~{::content})">
    <div th:fragment="content">
        <div class="page-header">
            <h1 th:text="#{admin.dashboard.title}">Panel Admina</h1>
            <p class="page-subtitle" th:text="#{admin.dashboard.subtitle}">Przegląd użytkowników i statystyki systemu.
            </p>
        </div>

        <!-- Stats Grid -->
        <div class="pure-g stats-grid">
            <div class="pure-u-1 pure-u-md-1-3 stat-grid-item">
                <div class="card stat-card-centered">
                    <span class="stat-card-label" th:text="#{admin.stats.users}">Użytkownicy</span>
                    <div class="stat-card-value" th:text="${users.size()}">0</div>
                </div>
            </div>
            <div class="pure-u-1 pure-u-md-1-3 stat-grid-item">
                <div class="card stat-card-centered">
                    <span class="stat-card-label" th:text="#{admin.stats.public}">Publiczne</span>
                    <div class="stat-card-value-success" th:text="${publicCount}">0</div>
                </div>
            </div>
            <div class="pure-u-1 pure-u-md-1-3 stat-grid-item">
                <div class="card stat-card-centered">
                    <span class="stat-card-label" th:text="#{admin.stats.private}">Prywatne</span>
                    <div class="stat-card-value-danger" th:text="${privateCount}">0</div>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="card">
            <h3 th:text="#{admin.dashboard.title}">Lista użytkowników</h3>
            <div class="table-overflow">
                <table class="pure-table pure-table-horizontal admin-table">
                    <thead>
                        <tr>
                            <th th:text="#{admin.table.user}">Użytkownik</th>
                            <th th:text="#{admin.table.status}">Status</th>
                            <th th:text="#{admin.table.date}">Data</th>
                            <th th:text="#{admin.table.actions}">Akcje</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td>
                                <div class="user-name" th:text="${user.username}"></div>
                                <div class="user-details"
                                    th:text="${user.firstName != null ? user.firstName + ' ' + (user.lastName != null ? user.lastName : '') : '-'}">
                                </div>
                            </td>
                            <td>
                                <span th:text="${user.isPublic ? 'Public' : 'Private'}"
                                    th:class="${user.isPublic ? 'status-badge status-badge-public' : 'status-badge status-badge-private'}"></span>
                            </td>
                            <td th:text="${user.createdAt != null ? #temporals.format(user.createdAt, 'dd.MM') : '-'}">
                            </td>
                            <td th:with="currentUser=${#authentication.name}">
                                <a th:href="@{/admin/user/{id}(id=${user.id})}" class="pure-button admin-action-btn"
                                    th:text="#{admin.actions.details}">Szczegóły</a>
                                <span th:if="${user.username != currentUser}">
                                    <a th:if="${!user.isBlocked}" th:href="@{/admin/user/block/{id}(id=${user.id})}"
                                        class="pure-button block-btn" th:text="#{admin.actions.block}">Blokuj</a>
                                    <a th:if="${user.isBlocked}" th:href="@{/admin/user/unblock/{id}(id=${user.id})}"
                                        class="pure-button unblock-btn" th:text="#{admin.actions.unblock}">Odblokuj</a>
                                    <form th:action="@{/admin/user/delete/{id}(id=${user.id})}" method="post"
                                        style="display:inline;"
                                        th:onsubmit="'return confirm(\'' + #{admin.confirm.delete} + '\')'">
                                        <button type="submit" class="pure-button delete-btn"
                                            th:text="#{admin.actions.delete}">Usuń</button>
                                    </form>
                                </span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

</body>

</html>
